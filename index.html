<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gw Live // Professional Ztreaming</title>
<meta name="referrer" content="no-referrer">
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>

<style>
:root {
    --accent-red: #FF0000;
    --glow-red: rgba(255, 0, 0, 0.6);
    --glass: rgba(0, 0, 0, 0.5);
    --border: rgba(255, 255, 255, 0.12);
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Inter', 'Segoe UI', Roboto, sans-serif; user-select: none; -webkit-user-select: none;}

.shaka-video-container { position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center;}
video { width:100%; height:100%; object-fit:contain; outline: none; }

/* --- Professional Broadcast Branding Bug --- */
.branding-bug {
    position: absolute;
    top: 25px;
    left: 25px;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 18px;
    background: var(--glass);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-radius: 10px;
    border: 1px solid var(--border);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    pointer-events: none;
}

.brand-text {
    font-size: 14px;
    font-weight: 900;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    /* Metallic Shimmer Effect */
    background: linear-gradient(90deg, #fff, var(--accent-red), #fff);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 5s infinite linear;
}

@keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
}

.pulse-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
}

.dot {
    width: 8px;
    height: 8px;
    background: var(--accent-red);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--accent-red);
}

.radar {
    position: absolute;
    width: 8px;
    height: 8px;
    border: 2px solid var(--accent-red);
    border-radius: 50%;
    animation: radar-pulse 2.5s infinite ease-out;
}

@keyframes radar-pulse {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(4.5); opacity: 0; }
}

/* --- UI Controls Customization --- */
.shaka-icon-button { color: var(--accent-red) !important; }
.shaka-range-element { color: var(--accent-red) !important; }
.shaka-bottom-controls { background: linear-gradient(transparent, rgba(0,0,0,0.95)) !important; padding: 15px !important; }
.shaka-current-time { color: #fff !important; font-weight: 700; font-size: 12px; }

@media(max-width:700px){
    .branding-bug { top: 15px; left: 15px; padding: 6px 12px; }
    .brand-text { font-size: 11px; letter-spacing: 1.5px; }
}
</style>
</head>
<body oncontextmenu="return false;">

<div class="shaka-video-container" id="player-container">
    <!-- Premium Branding Bug -->
    <div class="branding-bug">
        <div class="pulse-wrapper">
            <div class="dot"></div>
            <div class="radar"></div>
        </div>
        <div class="brand-text">Gw Live</div>
    </div>
    <video id="video" autoplay muted playsinline preload="metadata"></video>
</div>

<script>
(function(){

  // --- 1. SECURITY: ANTI-DEVTOOLS & ANTI-COPY ---
  setInterval(function() {
      const start = Date.now();
      debugger; 
      if (Date.now() - start > 100) window.location.reload();
  }, 1000);

  document.addEventListener('keydown', function(e) {
      if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83))) {
          e.preventDefault(); return false;
      }
  });

  // --- 2. CONFIG: ORIGINAL API ---
  const CONFIG={
    streamUrl:"https://jiotvpllive.cdn.jio.com//bpk-tv/Star_Sports_HD1_Hindi_BTS/output/index.mpd",
    keyId:"400131994b445d8c8817202248760fda",
    key:"2d56cb6f07a75b9aff165d534ae2bfc4",
    cookieUrl:"https://allrounder-live3.pages.dev/api/cookie.json"
  };
  document.addEventListener("DOMContentLoaded", async () => {
    shaka.polyfill.installAll();
    const video = document.getElementById("video");
    const container = document.getElementById("player-container");
    const player = new shaka.Player();
    await player.attach(video);
    const ui = new shaka.ui.Overlay(player, container, video);

    ui.configure({
      addBigPlayButton: true,
      controlPanelElements: ["play_pause", "mute", "volume", "spacer", "quality", "fullscreen"],
      seekBarColors: { base: "rgba(255,255,255,0.15)", buffered: "rgba(255,255,255,0.3)", played: "#FF0000" }
    });

    player.configure({
      drm: { clearKeys: { [CONFIG.keyId]: CONFIG.key } },
      manifest: { defaultPresentationDelay: 5 },
      streaming: { lowLatencyMode: true, bufferingGoal: 10, rebufferingGoal: 2 }
    });

    // --- 3. DYNAMIC COOKIE FETCH & FILTER ---
    let cookieValue = "";
    try {
      const response = await fetch(CONFIG.cookieUrl, { cache: "no-store" });
      const data = await response.json();
      cookieValue = data.cookie || "";
    } catch(e) {}

    if (cookieValue) {
      player.getNetworkingEngine().registerRequestFilter((type, request) => {
        request.headers["Referer"] = "https://www.jiotv.com/";
        request.headers["User-Agent"] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
        request.headers["Cookie"] = cookieValue;
        
        let urlToken = cookieValue.startsWith("__hdnea__=") ? cookieValue.substring(10) : cookieValue;
        urlToken = urlToken.split(';')[0].trim();

        if ((type === shaka.net.NetworkingEngine.RequestType.MANIFEST || type === shaka.net.NetworkingEngine.RequestType.SEGMENT) && !request.uris[0].includes("__hdnea__")) {
          const sep = request.uris[0].includes("?") ? "&" : "?";
          request.uris[0] += sep + "__hdnea__=" + urlToken;
        }
      });
    }

    try { 
        await player.load(CONFIG.streamUrl); 
        video.play().catch(() => {}); 
    } catch(e) {}

    video.addEventListener("play", () => { video.muted = false; });
  });
})();
</script>
</body>
</html>
